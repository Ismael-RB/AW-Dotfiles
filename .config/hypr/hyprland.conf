$mainMod = SUPER
$terminal = kitty
$fileManager = kitty --title files -e yazi

# Monitor
monitor = eDP-1, 2560x1600@240, 0x0, 1.6
# HDMI
monitor=,preferred,auto,1

# ── Power ───────────────────────────────────────────────────
bind = $mainMod, ESCAPE, exec, hyprlock
bind = $mainMod SHIFT, ESCAPE, exec, systemctl suspend
bind = $mainMod ALT, ESCAPE, exec, systemctl poweroff
bind = $mainMod CTRL, ESCAPE, exec, systemctl reboot


# ── Autostart ──────────────────────────────────────────────
exec-once = ~/.config/hypr/scripts/backup-configs.sh
exec-once = ~/.config/hypr/scripts/wal-reload.sh
exec-once = waybar
exec-once = hypridle
exec-once = mako
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper-cycle.sh current
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = ~/.config/hypr/scripts/ws1-fetch.sh
exec-once = ~/.config/hypr/scripts/battery-notify.sh
exec-once = ~/.config/hypr/scripts/bluetooth-notify.sh
exec-once = [workspace special:scratch silent; float; size 920 540; center] kitty --class scratchpad

# ── Environment ────────────────────────────────────────────
env = STEAM_FRAME_FORCE_CLOSE,1
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_THEME,Adwaita-dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

# ── Apps ───────────────────────────────────────────────────
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, fuzzel


# ── Ventanas ───────────────────────────────────────────────
bind = $mainMod, C, killactive,

# ── Scratchpad ─────────────────────────────────────────────
bind = $mainMod, V, togglespecialworkspace, scratch
bind = $mainMod SHIFT, V, movetoworkspacesilent, special:scratch

# ── Foco ───────────────────────────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, Tab,        cyclenext,
bind = $mainMod SHIFT, Tab,  cyclenext, prev

# ── Mover ventanas ─────────────────────────────────────────
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# ── Redimensionar ──────────────────────────────────────────
binde = $mainMod ALT, left,  resizeactive, -40 0
binde = $mainMod ALT, right, resizeactive,  40 0
binde = $mainMod ALT, up,    resizeactive, 0 -40
binde = $mainMod ALT, down,  resizeactive, 0  40

bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive,  40 0
binde = , left,  resizeactive, -40 0
binde = , up,    resizeactive, 0 -40
binde = , down,  resizeactive, 0  40
bind  = , escape, submap, reset
submap = reset

# ── Mouse ──────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1

# ── Workspaces ─────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# ── Wallpaper ──────────────────────────────────────────────
bind = $mainMod, braceright, exec, ~/.config/hypr/scripts/wallpaper-cycle.sh next
bind = $mainMod, braceleft,  exec, ~/.config/hypr/scripts/wallpaper-cycle.sh prev

# ── Captura de pantalla ────────────────────────────────────
bind = $mainMod SHIFT, S, exec, grimblast save area - | wl-copy --type image/png

# ── Teclado Alienware m16 R2 ───────────────────────────────
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Colores del wallpaper (pywal) ──────────────────────────
# source = ~/.cache/wal/colors-hyprland.conf

# ── Apariencia ─────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 6
}

decoration {
    rounding = 8
    active_opacity = 0.92
    inactive_opacity = 0.80

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 10
        passes = 3
        brightness = 0.8
        contrast = 1.1
        noise = 0.02
        new_optimizations = true
    }
}


# ── Window rules ───────────────────────────────────────────
windowrulev2 = float,        class:^(steam)$, title:^(Steam)$
windowrulev2 = size 1000 680, class:^(steam)$, title:^(Steam)$
windowrulev2 = center,       class:^(steam)$, title:^(Steam)$
windowrulev2 = float,        class:^(steam)$, title:^(Friends List)$

# ── Layer rules ────────────────────────────────────────────
layerrule = blur on, match:namespace SystemPill
layerrule = ignore_alpha 0.3, match:namespace SystemPill
layerrule = xray 1, match:namespace SystemPill

# El dashboard en ws1 lo maneja ws1-fetch.sh (exec-once arriba)

input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0.3
    accel_profile = adaptive

    touchpad {
        natural_scroll = false
        tap-to-click = true
        scroll_factor = 0.8
        disable_while_typing = true
        clickfinger_behavior = true
    }
}

# ── Gestos touchpad ────────────────────────────────────────
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 250
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 25
    workspace_swipe_cancel_ratio = 0.4
    workspace_swipe_create_new = false
}
