# Config mínima para la sesión dashboard de ws1.
# No afecta ninguna otra sesión tmux que puedas usar.

set -g status off
set -g mouse off

# Bordes de pane desde pywal
source-file ~/.cache/wal/tmux-wal.conf

# Sin delay al presionar Escape
set -sg escape-time 0

# Permite kitty graphics protocol a través de tmux
set -g allow-passthrough on

# Sin mensaje de actividad ni alertas visuales
set -g visual-activity  off
set -g visual-bell      off
set -g visual-silence   off
set -g monitor-activity off
set -g bell-action      none

# Colores del terminal
set -g default-terminal "tmux-256color"
