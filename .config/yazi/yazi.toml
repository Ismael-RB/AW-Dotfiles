[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true
linemode       = "none"

[preview]
tab_size       = 2
max_width      = 600
max_height     = 900
cache_dir      = ""
image_delay    = 30
image_filter   = "lanczos3"
image_quality  = 75

[opener]
edit = [
    { run = 'kitty -e nvim "$@"', desc = "nvim", block = true },
]
open = [
    { run = 'xdg-open "$@"', desc = "abrir" },
]
reveal = [
    { run = 'xdg-open "$(dirname "$0")"', desc = "revelar" },
]

[open]
rules = [
    { mime = "text/*",          use = ["edit", "open"] },
    { mime = "image/*",         use = ["open"] },
    { mime = "video/*",         use = ["open"] },
    { mime = "audio/*",         use = ["open"] },
    { mime = "application/pdf", use = ["open"] },
    { mime = "*",               use = ["open"] },
]
