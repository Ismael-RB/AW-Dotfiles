context.modules = [
{   name = libpipewire-module-filter-chain
    args = {
        node.description = "Speaker EQ"
        media.name       = "Speaker EQ"
        filter.graph = {
            nodes = [
                {
                    type   = lv2
                    name   = eq
                    plugin = "http://lsp-plug.in/plugins/lv2/para_equalizer_x16_stereo"
                    control = {
                        # ft: 0=Off 1=Bell 3=Hi-shelf 5=Lo-shelf
                        # g: ganancia lineal (1.0=0dB)
                        # Alienware M16 R2 — speakers side-firing 2W x2

                        # Preamp -4.5dB
                        "g_in" = 0.5957

                        # Band 0 — Lo-shelf -3.5dB a 80Hz (subsónico que distorsiona sin reproducirse)
                        "ft_0" = 5
                        "f_0"  = 80.0
                        "g_0"  = 0.6683
                        "w_0"  = 0.70

                        # Band 1 — Bell +2.5dB a 130Hz (graves reales donde el driver tiene energía)
                        "ft_1" = 1
                        "f_1"  = 130.0
                        "g_1"  = 1.3335
                        "w_1"  = 1.00

                        # Band 2 — Bell -1.5dB a 180Hz (resonancia de caja)
                        "ft_2" = 1
                        "f_2"  = 180.0
                        "g_2"  = 0.8414
                        "w_2"  = 1.50

                        # Band 3 — Bell -1.5dB a 380Hz (nasal de enclosures plásticos)
                        "ft_3" = 1
                        "f_3"  = 380.0
                        "g_3"  = 0.8414
                        "w_3"  = 1.20

                        # Band 4 — Bell +1.5dB a 2500Hz (presencia y claridad)
                        "ft_4" = 1
                        "f_4"  = 2500.0
                        "g_4"  = 1.1885
                        "w_4"  = 1.00

                        # Band 5 — Bell -2.0dB a 5000Hz (sibilancia de speakers laterales)
                        "ft_5" = 1
                        "f_5"  = 5000.0
                        "g_5"  = 0.7943
                        "w_5"  = 1.50

                        # Band 6 — Bell -1.0dB a 6500Hz (transición suave entre 5k y shelf de 8k)
                        "ft_6" = 1
                        "f_6"  = 6500.0
                        "g_6"  = 0.8913
                        "w_6"  = 1.00

                        # Band 7 — Hi-shelf +3.5dB a 8000Hz (aire perdido por ángulo lateral)
                        "ft_7" = 3
                        "f_7"  = 8000.0
                        "g_7"  = 1.4962
                        "w_7"  = 0.70

                        # Band 8 — Bell +1.5dB a 12000Hz (presencia alta)
                        "ft_8" = 1
                        "f_8"  = 12000.0
                        "g_8"  = 1.1885
                        "w_8"  = 1.20

                        # Bands 9-15 — Off
                        "ft_9"  = 0
                        "ft_10" = 0
                        "ft_11" = 0
                        "ft_12" = 0
                        "ft_13" = 0
                        "ft_14" = 0
                        "ft_15" = 0
                    }
                }
                {
                    type   = lv2
                    name   = limiter
                    plugin = "http://lsp-plug.in/plugins/lv2/limiter_stereo"
                    control = {
                        "th"      = -2.0
                        "lk"      = 5.0
                        "attack"  = 3.0
                        "release" = 50.0
                        "mode"    = 0
                    }
                }
            ]
            links = [
                { output = "eq:out_l", input = "limiter:in_l" }
                { output = "eq:out_r", input = "limiter:in_r" }
            ]
            inputs  = [ "eq:in_l",      "eq:in_r" ]
            outputs = [ "limiter:out_l", "limiter:out_r" ]
        }
        capture.props = {
            node.name        = "effect_input.speaker_eq"
            node.description = "Speaker EQ"
            media.class      = "Audio/Sink"
            audio.channels   = 2
            audio.position   = [ FL FR ]
        }
        playback.props = {
            node.name      = "effect_output.speaker_eq"
            node.passive   = true
            audio.channels = 2
            audio.position = [ FL FR ]
        }
    }
}
]
